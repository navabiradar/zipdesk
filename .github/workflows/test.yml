name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zipdesk_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Run vet
        working-directory: backend
        run: go vet ./...

      - name: Run unit tests
        working-directory: backend
        run: go test ./internal/... -v -short
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/zipdesk_test
          REDIS_URL: redis://localhost:6379
          APP_SECRET: test-secret-256-bit
          JWT_SECRET: test-jwt-secret

      - name: Run migrations
        working-directory: backend
        run: |
          go install \
          github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate \
          -path ./migrations \
          -database postgres://postgres:test@localhost:5432/zipdesk_test?sslmode=disable \
          up

      - name: Run integration tests
        working-directory: backend
        run: go test ./tests/integration/... -v -timeout 120s
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/zipdesk_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          APP_SECRET: test-secret-256-bit
          JWT_SECRET: test-jwt-secret
