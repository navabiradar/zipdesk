server:
  port: 8080
  env: development
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  max_open_connections: 20
  max_idle_connections: 5
  connection_lifetime: 1h

redis:
  pool_size: 10
  min_idle_connections: 5

jwt:
  expiry: 15m
  refresh_expiry: 720h

rate_limit:
  auth_requests_per_minute: 10
  api_requests_per_minute: 100
  public_requests_per_minute: 30

plan_limits:
  free:
    links_per_month: 20
    forms: 1
    form_responses_per_month: 50
    email_contacts: 200
    emails_per_month: 1000
    docs_per_month: 3
    crm_contacts: 100
    ai_queries_per_month: 10
    seats: 1
  starter:
